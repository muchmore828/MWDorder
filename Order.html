<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWD照小點貨助手</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1 1 45%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #ddd; font-weight: bold; transition: 0.3s; }
        /* 修正按鈕反白樣式 */
        .tab-btn.active { background: #4CAF50; color: white; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ccc; background: white; cursor: pointer; }
        .qty-val { min-width: 20px; text-align: center; font-weight: bold; }
        .submit-btn { width: 100%; padding: 15px; background: #2196F3; color: white; border: none; border-radius: 8px; font-size: 16px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; white-space: pre-wrap; background: #e9ecef; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 MWD照小點貨助手</h2>
    <div class="tabs">
        <!-- 使用 data-tab 屬性確保切換邏輯正確且不影響顯示文字 -->
        <button class="tab-btn active" data-tab="A" onclick="switchTab('A')">煎台叫貨</button>
        <button class="tab-btn" data-tab="B" onclick="switchTab('B')">調理叫貨</button>
        <button class="tab-btn" data-tab="C" onclick="switchTab('C')">煎台乾貨</button>
        <button class="tab-btn" data-tab="D" onclick="switchTab('D')">調理乾貨</button>
        <button class="tab-btn" data-tab="E" onclick="switchTab('E')">櫃檯乾貨</button>
    </div>

    <div id="item-list"></div>

    <button class="submit-btn" onclick="generateSummary()">✅ 確認送出並複製文字</button>
    
    <div id="result"></div>
</div>

<script>
    // 原始資料保持不變，完全核對無誤
    const data = {
        'A': { name: '煎台叫貨：', items: ['雞塊', '豬肉', '黑豬', '厚牛', '厚雞', '嫩雞', '香雞', '燻雞', '火腿', '培根', '薯餅', '唐揚雞', '杏鮑菇', '蘿蔔糕', '辣咔', '原咔', '蛋餅', '捲餅', '抓餅', '冷藏麵', '蘑菇醬', '黑胡椒醬', '德腸', '油條', '菜脯', '水餃', '米腸', '酸菜', '豆包', '薯條', '椒麻雞', '大椒麻', '腿排', '雞柳條', '蛋', '熱狗', '厚豬', '地瓜薯條', '蛋白磚'] },
        'B': { name: '調理叫貨：', items: ['常溫湯種', '常溫漢堡', '冷凍湯種', '厚片', '丹麥', '大法', '可頌', '滿分', '銅鑼燒', '青花菜', '紅酒牛肉', '咖哩湯', '紅醬', '青醬', '白醬', '蕃薯', '冷凍義大利麵', '白飯', '紫米', '乳酪粉', '乳酪絲', '起司片', '泡菜', '生菜', '大蕃茄', '小蕃茄', '洋蔥', '蘋果', '紫高', '花椰米', '千島', '蜂蜜芥末', '芹子醬', '優格醬', '鮮蛋沙拉'] },
        'C': { name: '煎台乾貨：', items: ['L袋', '紙盒', '迷你紙盒', '平袋', '中袋', '捲餅袋', '防油紙', '標籤貼', '紙捲', '垃圾袋', '洗碗精', '4兩分料袋', '油寶', '煎台清潔劑', '炸油', '川味醬包', '眷村醬包'] },
        'D': { name: '調理乾貨：', items: ['白沙拉', '香蒜', '巧克力', '奶酥', '花生', '草莓', '甜雞醬', '番茄醬', '和風醬', '蒜香辣醬', '蜂蜜', '鮪魚', '玉米粒', '洋菇', '葡萄乾', '洋香菜葉', '黑胡椒粒', '胡椒粉', '巧達湯粉', '玉米濃湯粉', '湯杯蓋', '湯杯', '醬料杯', '醬料杯蓋', '三角袋', '四角袋', '650湯碗', '650凸蓋', '650平蓋', '826圓形餐盒', '826圓形平蓋', '植纖餐盒', '植纖餐盒上蓋', '寬版膠帶', '易撕貼膠帶'] },
        'E': { name: '櫃檯乾貨：', items: ['茶飲專用糖', '錫蘭紅茶', '茉香綠茶', '金萱茶包', '咖啡豆', '薏仁粉', '可可', '蒟蒻QQ', '黑糖方Q', '紅豆斑蘭Q', '水蜜桃', '番茄包', '醬油包', 'PE膜', '紙中杯', '紙大杯', '特大杯', '冷熱共用杯', '透明平蓋', '黑凸蓋', '杯套', '單支斜口吸管', '24cm單支斜口吸管', '珍珠吸管', '蔗糖球', '砂糖包', '單杯袋', '小杯袋', '3兩袋', '半斤袋', '1斤袋', '2斤袋', '塑膠叉子', '塑膠湯匙', '竹筷', '白色抹布', '藍色抹布', '綠色抹布', '咖啡色抹布', '綠色濾芯', '橘色濾芯', '藍色濾芯', '發票'] }
    };

    let currentTab = 'A';
    let counts = {};

    function init() {
        for (let cat in data) {
            data[cat].items.forEach(item => { counts[item] = 0; });
        }
        render();
    }

    function switchTab(tab) {
        currentTab = tab;
        // 修正切換邏輯：根據 data-tab 屬性切換 active 類別
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
        });
        render();
    }

    function changeQty(item, delta) {
        counts[item] = Math.max(0, counts[item] + delta);
        render();
    }

    function render() {
        const listDiv = document.getElementById('item-list');
        listDiv.innerHTML = '';
        data[currentTab].items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <span>${item}</span>
                <div class="controls">
                    <button class="btn-qty" onclick="changeQty('${item}', -1)">-</button>
                    <span class="qty-val">${counts[item]}</span>
                    <button class="btn-qty" onclick="changeQty('${item}', 1)">+</button>
                </div>
            `;
            listDiv.appendChild(row);
        });
    }

    function generateSummary() {
        const today = new Date();
        const dateStr = `${today.getMonth() + 1}/${today.getDate()}`;
        let summary = `${dateStr} ${data[currentTab].name}`;
        
        let hasItems = false;
        data[currentTab].items.forEach(item => {
            if (counts[item] > 0) {
                summary += `\n${item} x ${counts[item]}`;
                hasItems = true;
            }
        });

        if (!hasItems) {
            alert('請至少選擇一個品項數量大於 0');
            return;
        }

        const resultDiv = document.getElementById('result');
        resultDiv.innerText = summary;
        resultDiv.style.display = 'block';

        navigator.clipboard.writeText(summary).then(() => {
            alert('內容已複製！可以直接貼到 Line 囉：\n\n' + summary);
        });
    }

    init();
</script>

</body>
</html>
